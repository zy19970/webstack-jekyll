<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="viggo" />
    <title>{{ site.title }}</title>
    <meta name="keywords" content="{{ site.keywords }}">
    <meta name="description" content="{{ site.description }}">
    <link rel="shortcut icon" href="/assets/images/favicon.svg">
    <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Arimo:400,700,400italic">
    <link rel="stylesheet" href="/assets/css/fonts/linecons/css/linecons.css">
    <link rel="stylesheet" href="/assets/css/fonts/fontawesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="/assets/css/bootstrap.css">
    <link rel="stylesheet" href="/assets/css/xenon-core.css">
    <link rel="stylesheet" href="/assets/css/xenon-components.css">
    <link rel="stylesheet" href="/assets/css/xenon-skins.css">
    <link rel="stylesheet" href="/assets/css/nav.css">
    <script src="/assets/js/jquery-1.11.1.min.js"></script>
    <!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
        <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <!-- / FB Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site.url }}">
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:image" content="{{ site.url }}/assets/images/webstack_banner_cn.png">
    <meta property="og:site_name" content="{{ site.title }}">
    <!-- / Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ site.title }}">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{{ site.url }}/assets/images/webstack_banner_cn.png">
</head>

<body class="page-body">
    
    <!-- skin-white -->
    <div class="page-container">
            <!-- 百度搜索框 -->
            <form action="https://www.baidu.com/s" method="get" style="text-align: center; margin: 20px 0;">
                <input type="text" name="wd" placeholder="请输入搜索关键词..." style="width: 500px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;">
                <input type="submit" value="百度搜索" style="padding: 10px 20px; font-size: 16px; background-color: #4e6ef2; color: white; border: none; border-radius: 4px; cursor: pointer;">
            </form>
        {{ content }}
    </div>
    
    <!-- Bottom Scripts -->
    <script src="/assets/js/bootstrap.min.js"></script>
    <script src="/assets/js/TweenMax.min.js"></script>
    <script src="/assets/js/resizeable.js"></script>
    <script src="/assets/js/joinable.js"></script>
    <script src="/assets/js/xenon-api.js"></script>
    <script src="/assets/js/xenon-toggles.js"></script>
    <!-- JavaScripts initializations and stuff -->
    <script src="/assets/js/xenon-custom.js"></script>
</body>

</html>
