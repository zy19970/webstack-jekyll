<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ctrl+Shift+U</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      color: #ffffff;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    /* ===== 显示区域 ===== */
    #displayArea {
      margin-bottom: 30px;
      padding: 25px;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 10px;
      min-height: 100px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 18px;
      color: #ffffff;
      white-space: pre-wrap;
      word-break: break-all;
    }
    /* ===== 输入区域 ===== */
    .input-section {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      resize: vertical;
      min-height: 80px;
      padding: 14px;
      font-size: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      color: #ffffff;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    textarea:focus {
      outline: none;
      border-color: #5d8aff;
      box-shadow: 0 0 0 3px rgba(93, 138, 255, 0.2);
    }
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    button {
      background: linear-gradient(45deg, #4776E6, #8E54E9);
      color: white;
      padding: 14px 32px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }
    .btn-clear {
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
    }
    .help {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>开始朗读：</h1>

    <!-- 1. 显示区域（最上方） -->
    <div id="displayArea">请输入文字并点击提交按钮</div>

    <!-- 2. 输入/提交/清空区域 -->
    <div class="input-section">
      <div style="flex:1">
        <textarea id="textInput" placeholder="支持换行，按 Ctrl+Enter 提交..." autofocus></textarea>
        <div class="help">提示：按 Ctrl+Shift+U 开始朗读</div>
      </div>
      <button onclick="displayText()">提交</button>
      <button class="btn-clear" onclick="clearAll()">清空</button>
    </div>
  </div>

  <script>
    const displayArea = document.getElementById('displayArea');
    const textarea = document.getElementById('textInput');

    function displayText() {
      const text = textarea.value.trim();
      if (text === '') {
        alert('请输入一些文字！');
        return;
      }
      // 仅保留当前次提交
      displayArea.textContent = text;
      textarea.value = '';
      textarea.focus();
    }

    function clearAll() {
      displayArea.textContent = '请输入文字并点击提交按钮';
      textarea.value = '';
      textarea.focus();
    }

    // Ctrl+Enter 提交
    textarea.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        displayText();
      }
    });
  </script>
</body>
</html>
